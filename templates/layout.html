<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }} - {% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="topbar">
    <div class="logo">
        <svg viewBox="0 0 24 24" class="logo-icon" aria-hidden="true">
            <path d="M3 12L12 3l9 9-9 9-9-9zm9-5.5L6.5 12 12 17.5 17.5 12 12 6.5z"></path>
        </svg>
        <span class="logo-text">{{ app_name }}</span>
    </div>
    <div class="topbar-right">
        <span class="badge badge-success">Online</span>
    </div>
</header>

<main class="main-container">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <span>&copy; {{ app_name }} - HamEd Hub Monitor</span>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
